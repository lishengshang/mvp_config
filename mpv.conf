#d3d11-output-csp=pq                          # [须 --gpu-api=d3d11] 此项参数用于直出 HDR，且不支持条件配置会影响 sdr 播放
                                              # 当前版本需先手动打开系统 HDR
use-filedir-conf = yes                            # 在播放文件同目录中加载配置文件
include="~~/profiles.conf"                   # 追加读取指定的配置文件
#input-conf="~~/input.conf"                   # 指定 input 配置文件，用于指定键位绑定