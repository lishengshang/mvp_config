gpu-shader-cache-dir="~~/cache/shaders_cache"                                   # 指定目录存储编译好的 GPU shaders，加速启动。默认启用
                                                                                ## 注意！如果不放 APPDATA 下，确保该文件夹有用户写入权限。
                                                                                ## 缓存生成的着色器本应起到加速作用，但是硬盘 IO 性能不足可能产生反作用，根据实际情况选择禁不禁用
##⇘⇘脚本部分
